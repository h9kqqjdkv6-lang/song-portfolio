[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

  [functions."cron-intel"]
    schedule = "0 1 * * *"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Environment variables (set in Netlify Dashboard):
#   SUPABASE_URL, SUPABASE_KEY, SUPABASE_SERVICE_KEY
#   DEEPSEEK_API_KEY, DEEPSEEK_GENERATION_MODEL, DEEPSEEK_MONTHLY_BUDGET_CNY
#   AMAP_KEY, QWEATHER_KEY
